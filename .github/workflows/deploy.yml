name: GitHub'dan Sunucuya Otomatik Yayın (CI/CD)

on:
  push:
    branches:
      - main  # Senin ana dalın hangisiyse (main veya master)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu GitHub'dan Çek
        uses: actions/checkout@v3

      - name: Node.js Kur
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: React Build Al
        run: |
          cd frontend
          npm install
          npm run build
        # Bu aşamada GitHub'ın içinde 'frontend/build' klasörü oluştu

      - name: Dosyaları Sunucuya Gönder (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/build/*"
          target: "/var/www/portfolio"
          strip_components: 2 # 'frontend/build' kısmını atar, içeriği direkt portfolio'ya koyar

      - name: Sunucuda İzinleri ve Nginx'i Güncelle
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Portfolyo klasörünü temizle ve yeni dosyaların sahibi Nginx olsun
            chown -R www-data:www-data /var/www/portfolio
            chmod -R 755 /var/www/portfolio
            # Nginx'i tazele
            systemctl restart nginx