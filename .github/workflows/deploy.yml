name: GitHub'dan Sunucuya Otomatik Yayın (CI/CD)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu GitHub'dan Çek
        uses: actions/checkout@v3

      - name: Node.js Kur (Versiyon 20)
        uses: actions/setup-node@v3
        with:
          node-version: '20' # BURAYI 20 YAPTIK (Gerekli)

      - name: React Build Al
        run: |
          cd frontend
          # Önce temizlik yapıp sonra bağımlılıkları kuralım
          npm install --legacy-peer-deps
          # Eksik olan ajv paketini zorla ekleyelim (Hata çözümü)
          npm install ajv --legacy-peer-deps 
          npm run build

      - name: Dosyaları Sunucuya Gönder (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/build/*"
          target: "/var/www/portfolio"
          strip_components: 2

      - name: Sunucuda İzinleri ve Nginx'i Güncelle
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chown -R www-data:www-data /var/www/portfolio
            chmod -R 755 /var/www/portfolio
            systemctl restart nginx
